name: voicenotes_ai
description: "Transform your spoken ideas into perfectly organized notes and tasks with VoiceNotes AI, the smart cross-platform app that listens, transcribes in any language, and intuitively structures your thoughts so you never miss a beat."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  path_provider: ^2.0.0
  record: '>=5.1.2'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  flutter_riverpod: ^3.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
